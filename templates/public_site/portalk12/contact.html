{% extends 'public_site/portalk12/base.html' %}
{% block title %}Contato | PortalK12{% endblock %}
{% block content %}
<div class="section-padding"><div class="container"><div class="max-w-[860px] mx-auto"><div class="text-center"><div class="mini-title">Contato</div><div class="column-title">Vamos conversar sobre sua <span class="shape-bg">operação escolar</span></div></div>{% if success %}<div class="bg-green-paste p-4 rounded mt-6">Mensagem enviada com sucesso.</div>{% endif %}<form method="post" class="pt-10 space-y-4">{% csrf_token %}<input name="full-name" class="w-full border rounded px-4 py-3" placeholder="Nome completo" required><input type="email" name="email" class="w-full border rounded px-4 py-3" placeholder="E-mail" required><input name="phone" class="w-full border rounded px-4 py-3" placeholder="Telefone"><textarea name="message" class="w-full border rounded px-4 py-3" rows="5" placeholder="Mensagem"></textarea><label class="flex items-center gap-2"><input type="checkbox" name="lgpd_consent" required> Aceito a política de privacidade.</label><button class="btn btn-primary" type="submit">Enviar mensagem</button></form></div></div></div>
{% endblock %}
