{% load static %}
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Contacts</title><link rel="stylesheet" href="{% static 'public_site/edumim/css/app.css' %}"></head><body class="font-gilroy font-medium text-gray text-lg leading-[27px]">
<div class="breadcrumbs section-padding bg-[url('../images/all-img/bred.png')] bg-cover bg-center bg-no-repeat"><div class="container text-center"><h2>{{ title }}</h2><p>{{ subtitle }}</p></div></div>
<div class="section-padding"><div class="container max-w-[760px]">{% if success %}<div class="mb-6 p-4 rounded bg-green-paste">Message sent successfully.</div>{% endif %}<form method="post" class="space-y-4">{% csrf_token %}<input class="w-full border rounded p-3" name="full-name" placeholder="Full Name" required><input class="w-full border rounded p-3" name="email" type="email" placeholder="Email" required><input class="w-full border rounded p-3" name="phone" placeholder="Phone"><textarea class="w-full border rounded p-3" name="message" placeholder="Message"></textarea><label class="flex items-center gap-2"><input type="checkbox" name="lgpd_consent" required> I agree with privacy terms.</label><button class="btn btn-primary" type="submit">Send Message</button></form></div></div>
</body></html>
