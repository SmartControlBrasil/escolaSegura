<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EscolaSegura Família</title>
  <style>
    :root { color-scheme: light; --bg:#f5f7fb; --card:#ffffff; --ink:#172033; --muted:#687386; --line:#dfe5ef; --brand:#0f766e; --brand-dark:#115e59; --soft:#e7f6f4; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, sans-serif; background:var(--bg); color:var(--ink); }
    a { color:var(--brand-dark); text-decoration:none; }
    .topbar { position:sticky; top:0; z-index:2; background:var(--brand); color:white; padding:16px; box-shadow:0 2px 10px rgba(0,0,0,.12); }
    .topbar h1 { margin:0; font-size:20px; }
    .topbar p { margin:4px 0 0; opacity:.9; font-size:13px; }
    .wrap { max-width:920px; margin:0 auto; padding:16px; }
    .nav { display:flex; gap:8px; overflow-x:auto; padding:8px 0 16px; }
    .nav a { flex:0 0 auto; background:var(--card); border:1px solid var(--line); border-radius:999px; padding:9px 12px; font-size:14px; }
    .grid { display:grid; gap:12px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; box-shadow:0 6px 16px rgba(21,34,50,.05); }
    .card h2, .card h3 { margin:0 0 8px; }
    .muted { color:var(--muted); }
    .badge { display:inline-block; border-radius:999px; padding:4px 9px; background:var(--soft); color:var(--brand-dark); font-size:12px; font-weight:bold; }
    .list { display:grid; gap:10px; }
    .row { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; border-top:1px solid var(--line); padding-top:12px; margin-top:12px; }
    .row:first-child { border-top:0; padding-top:0; margin-top:0; }
    .actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .button { display:inline-block; border-radius:10px; background:var(--brand); color:white; padding:10px 12px; font-weight:bold; }
    .empty { padding:24px; text-align:center; color:var(--muted); }
    .metric { font-size:24px; font-weight:bold; }
    @media (min-width: 760px) { .grid.cols { grid-template-columns: repeat(2, minmax(0, 1fr)); } .topbar h1 { font-size:24px; } }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>EscolaSegura Família</h1>
    <p>{% if guardian %}{{ guardian.full_name }}{% else %}Portal do responsável{% endif %}</p>
  </header>
  <main class="wrap">
    {% if student %}
    <nav class="nav" aria-label="Navegação do aluno">
      <a href="{% url 'parent_portal:student_detail' student.id %}">Resumo</a>
      <a href="{% url 'parent_portal:attendance' student.id %}">Frequência</a>
      <a href="{% url 'parent_portal:announcements' student.id %}">Comunicados</a>
      <a href="{% url 'parent_portal:messages' student.id %}">Mensagens</a>
      <a href="{% url 'parent_portal:authorizations' student.id %}">Autorizações</a>
      <a href="{% url 'parent_portal:report_card' student.id %}">Boletim</a>
    </nav>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
