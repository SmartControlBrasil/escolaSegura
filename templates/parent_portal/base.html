{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>EscolaSegura Família</title>
  <link rel="manifest" href="{% url 'parent_portal:manifest' %}">
  <meta name="theme-color" content="#0f766e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="EscolaSegura Família">
  <link rel="icon" href="{% static 'parent_portal/icons/icon.svg' %}" type="image/svg+xml">
  <link rel="stylesheet" href="{% static 'parent_portal/css/parent_portal.css' %}">
</head>
<body>
  <header class="topbar">
    <h1>EscolaSegura Família</h1>
    <p>{% if guardian %}{{ guardian.full_name }}{% else %}Portal do responsável{% endif %}</p>
  </header>
  <main class="wrap">
    {% if student %}
    <nav class="nav" aria-label="Navegação do aluno">
      <a href="{% url 'parent_portal:student_detail' student.id %}">Resumo</a>
      <a href="{% url 'parent_portal:attendance' student.id %}">Frequência</a>
      <a href="{% url 'parent_portal:announcements' student.id %}">Comunicados</a>
      <a href="{% url 'parent_portal:messages' student.id %}">Mensagens</a>
      <a href="{% url 'parent_portal:authorizations' student.id %}">Autorizações</a>
      <a href="{% url 'parent_portal:report_card' student.id %}">Boletim</a>
    </nav>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register("{% url 'parent_portal:service_worker' %}", { scope: '/familia/' }).catch(function () {});
      });
    }
  </script>
</body>
</html>
