{% extends 'backoffice/base.html' %}
{% block content %}
<div class="row">
  <div class="col-12 col-lg-8 mx-auto">
    <div class="card">
      <div class="card-header py-3">
        <h6 class="mb-0">Novo Item de Catálogo</h6>
      </div>
      <div class="card-body">
        <form method="post" action="{% url 'backoffice:catalogo_novo' %}">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Tipo</label>
            <select name="type" class="form-select">
              <option value="product">Produto (Chapa, Cuba, etc)</option>
              <option value="service">Serviço (Mão de Obra, Instalação)</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Nome do Item *</label>
            <input type="text" name="name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Unidade de Medida</label>
            <select name="unit" class="form-select">
              <option value="m2">Metro Quadrado (m²)</option>
              <option value="ml">Metro Linear (ml)</option>
              <option value="un">Unidade (un)</option>
              <option value="h">Hora (h)</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Preço de Venda (R$)</label>
            <input type="text" name="sale_price" class="form-control" placeholder="0.00">
          </div>
          <div class="text-end">
            <a href="{% url 'backoffice:catalogo' %}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Salvar</button>
          </div>
        
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Custo Estimado</label>
            <input type="text" name="cost_price" class="form-control" placeholder="0.00">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Margem Sugerida (%)</label>
            <input type="text" name="suggested_margin" class="form-control" placeholder="0.00">
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label">Imagem Demonstrativa</label>
        <input type="file" name="image" class="form-control" accept="image/*">
    </div>
    <div class="mb-3">
        <label class="form-label">Fornecedor</label>
        <select name="supplier" class="form-select">
            <option value="">Nenhum</option>
            {% for s in suppliers %}
            <option value="{{ s.id }}">{{ s.name }}</option>
            {% endfor %}
        </select>
    </div>
    
</form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
