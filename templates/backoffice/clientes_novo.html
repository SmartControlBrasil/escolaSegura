{% extends 'backoffice/base.html' %}
{% block content %}
<div class="row">
  <div class="col-12 col-lg-8 mx-auto">
    <div class="card">
      <div class="card-header py-3">
        <h6 class="mb-0">Novo Cliente</h6>
      </div>
      <div class="card-body">
        <form method="post" action="{% url 'backoffice:clientes_novo' %}">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Tipo de Cliente</label>
            <select name="type" class="form-select">
              <option value="person">Pessoa Física</option>
              <option value="company" selected>Pessoa Jurídica</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Nome / Razão Social *</label>
            <input type="text" name="name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Documento (CPF/CNPJ)</label>
            <input type="text" name="document" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" name="email" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Telefone</label>
            <input type="text" name="phone" class="form-control">
          </div>
          <div class="text-end">
            <a href="{% url 'backoffice:clientes' %}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Salvar</button>
          </div>
        
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">WhatsApp</label>
            <input type="text" name="whatsapp" class="form-control" placeholder="(00) 00000-0000">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Origem do Lead</label>
            <input type="text" name="lead_origin" class="form-control" placeholder="Ex: Instagram, Indicação">
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label">Endereço Completo</label>
        <textarea name="address" class="form-control" rows="2"></textarea>
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" name="lgpd_consent" class="form-check-input" id="lgpd">
        <label class="form-check-label" for="lgpd">Consentimento LGPD Ativo</label>
    </div>
    
</form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
