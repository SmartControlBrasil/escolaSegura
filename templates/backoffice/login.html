{% load static %}
<!doctype html>
<html lang="en" class="light-theme">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="{% static 'backoffice/assets/images/favicon-32x32.png' %}" type="image/png" />
  <!-- Bootstrap CSS -->
  <link href="{% static 'backoffice/assets/css/bootstrap.min.css' %}" rel="stylesheet" />
  <link href="{% static 'backoffice/assets/css/bootstrap-extended.css' %}" rel="stylesheet" />
  <link href="{% static 'backoffice/assets/css/style.css' %}" rel="stylesheet" />
  <link href="{% static 'backoffice/assets/css/icons.css' %}" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">

  <!-- loader-->
  <link href="{% static 'backoffice/assets/css/pace.min.css' %}" rel="stylesheet" />

  <title>Marmoraria360 - Login</title>
</head>

<body>

  <!--start wrapper-->
  <div class="wrapper">
    
       <!--start content-->
       <main class="authentication-content">
        <div class="container-fluid">
          <div class="authentication-card">
            <div class="card shadow rounded-0 overflow-hidden">
              <div class="row g-0">
                <div class="col-lg-6 bg-login d-flex align-items-center justify-content-center">
                  <img src="{% static 'backoffice/assets/images/error/login-img.jpg' %}" class="img-fluid" alt="">
                </div>
                <div class="col-lg-6">
                  <div class="card-body p-4 p-sm-5">
                    <h5 class="card-title">Acesse o Painel</h5>
                    <p class="card-text mb-5">Marmoraria360 - Gestão Comercial Integrada</p>
                    
                    {% if errors %}
                      <div class="alert alert-danger radius-30 px-4" role="alert">
                        {% for error in errors %}
                          <div>{{ error }}</div>
                        {% endfor %}
                      </div>
                    {% endif %}
                    
                    <form class="form-body" method="post" action="{% url 'backoffice:login' %}">
                      {% csrf_token %}
                      {% if next %}
                        <input type="hidden" name="next" value="{{ next }}">
                      {% endif %}
                      
                      <div class="login-separater text-center mb-4"> <span>INSIRA SUAS CREDENCIAIS</span>
                        <hr>
                      </div>
                        <div class="row g-3">
                          <div class="col-12">
                            <label for="inputUsername" class="form-label">Usuário</label>
                            <div class="ms-auto position-relative">
                              <div class="position-absolute top-50 translate-middle-y search-icon px-3"><i class="bi bi-person-fill"></i></div>
                              <input type="text" name="username" class="form-control radius-30 ps-5" id="inputUsername" placeholder="Usuário" required>
                            </div>
                          </div>
                          <div class="col-12">
                            <label for="inputChoosePassword" class="form-label">Senha</label>
                            <div class="ms-auto position-relative">
                              <div class="position-absolute top-50 translate-middle-y search-icon px-3"><i class="bi bi-lock-fill"></i></div>
                              <input type="password" name="password" class="form-control radius-30 ps-5" id="inputChoosePassword" placeholder="Senha" required>
                            </div>
                          </div>
                          <div class="col-6">
                            <div class="form-check form-switch">
                              <input class="form-check-input" type="checkbox" id="flexSwitchCheckChecked" checked="">
                              <label class="form-check-label" for="flexSwitchCheckChecked">Lembrar-me</label>
                            </div>
                          </div>
                          <div class="col-6 text-end">	<a href="#">Esqueceu a senha?</a>
                          </div>
                          <div class="col-12">
                            <div class="d-grid">
                              <button type="submit" class="btn btn-primary radius-30">Entrar</button>
                            </div>
                          </div>
                        </div>
                    </form>
                 </div>
                </div>
              </div>
            </div>
          </div>
        </div>
       </main>
        
       <!--end page main-->

  </div>
  <!--end wrapper-->


  <!--plugins-->
  <script src="{% static 'backoffice/assets/js/jquery.min.js' %}"></script>
  <script src="{% static 'backoffice/assets/js/pace.min.js' %}"></script>


</body>

</html>
