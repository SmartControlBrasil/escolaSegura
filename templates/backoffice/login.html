{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EscolaSegura | Login</title>
  <link rel="stylesheet" href="{% static 'backoffice/minimal.css' %}">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1 class="mb-2">EscolaSegura</h1>
      <p class="text-secondary mb-3">Acesse o backoffice administrativo.</p>
      {% if errors %}
        <div class="alert alert-danger">
          {% for error in errors %}{{ error }}{% if not forloop.last %}<br>{% endif %}{% endfor %}
        </div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
        <div class="mb-3">
          <label class="form-label" for="username">Usuário</label>
          <input class="form-control" id="username" name="username" type="text" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Senha</label>
          <input class="form-control" id="password" name="password" type="password" required>
        </div>
        <button class="btn btn-primary" type="submit">Entrar</button>
      </form>
    </div>
  </div>
</body>
</html>
