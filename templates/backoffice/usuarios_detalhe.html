{% extends 'backoffice/base.html' %}
{% block content %}
<div class="row">
  <div class="col-12 col-lg-8 mx-auto">
    <div class="card">
      <div class="card-header py-3">
        <h6 class="mb-0">Detalhes: Usuário: {{ user.name }}</h6>
      </div>
      <div class="card-body">
        <form method="post" action="{% url 'backoffice:usuarios_detalhe' user.id %}">
{% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Usuário</label>
            <input type="text" name="username" class="form-control" value="{{ user.username }}">
          </div>
          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="text" name="email" class="form-control" value="{{ user.email }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Função</label>
            <select name="role" class="form-select">
              <option value="sales" {% if user.role == "sales" %}selected{% endif %}>Comercial</option>
              <option value="tech" {% if user.role == "tech" %}selected{% endif %}>Técnico</option>
              <option value="financial" {% if user.role == "financial" %}selected{% endif %}>Financeiro</option>
            </select>
          </div>
          <div class="text-end">
            <a href="{% url 'backoffice:usuarios' %}" class="btn btn-secondary">Voltar</a>
            <button type="submit" class="btn btn-primary">Atualizar</button>
          </div>
</form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
