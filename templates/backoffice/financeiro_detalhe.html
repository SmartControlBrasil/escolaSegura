{% extends 'backoffice/base.html' %}
{% block content %}
<div class="row">
  <div class="col-12 col-lg-8 mx-auto">
    <div class="card">
      <div class="card-header py-3">
        <h6 class="mb-0">Detalhes: Registro Financeiro: {{ record.name }}</h6>
      </div>
      <div class="card-body">
        <form method="post" action="{% url 'backoffice:financeiro_detalhe' record.id %}">
{% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Descrição</label>
            <input type="text" name="description" class="form-control" value="{{ record.description }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Valor</label>
            <input type="text" name="amount" class="form-control" value="{{ record.amount }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Data de Vencimento</label>
            <input type="date" name="due_date" class="form-control" value="{{ record.due_date|date:"Y-m-d" }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-select">
              <option value="pending" {% if record.status == "pending" %}selected{% endif %}>Pendente</option>
              <option value="paid" {% if record.status == "paid" %}selected{% endif %}>Pago / Recebido</option>
            </select>
          </div>
          <div class="text-end">
            <a href="{% url 'backoffice:financeiro' %}" class="btn btn-secondary">Voltar</a>
            <button type="submit" class="btn btn-primary">Atualizar</button>
          </div>
</form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
