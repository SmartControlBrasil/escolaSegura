{% extends 'backoffice/base.html' %}
{% block content %}
<div class="row">
  <div class="col-12 col-lg-8 mx-auto">
    <div class="card">
      <div class="card-header py-3">
        <h6 class="mb-0">Detalhes: Entrega: {{ delivery.name }}</h6>
      </div>
      <div class="card-body">
        <form method="post" action="{% url 'backoffice:entregas_detalhe' delivery.id %}">
{% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Data de Entrega</label>
            <input type="date" name="delivery_date" class="form-control" value="{{ delivery.delivery_date|date:"Y-m-d" }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-select">
              <option value="scheduled" {% if delivery.status == "scheduled" %}selected{% endif %}>Agendada</option>
              <option value="delivered" {% if delivery.status == "delivered" %}selected{% endif %}>Entregue</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Observações</label>
            <input type="text" name="notes" class="form-control" value="{{ delivery.notes }}">
          </div>
          <div class="text-end">
            <a href="{% url 'backoffice:entregas' %}" class="btn btn-secondary">Voltar</a>
            <button type="submit" class="btn btn-primary">Atualizar</button>
          </div>
</form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
