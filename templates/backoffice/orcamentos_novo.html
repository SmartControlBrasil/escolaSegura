{% extends 'backoffice/base.html' %}
{% block content %}
<div class="row">
  <div class="col-12 col-lg-8 mx-auto">
    <div class="card">
      <div class="card-header py-3">
        <h6 class="mb-0">Novo Orçamento</h6>
      </div>
      <div class="card-body">
        <form method="post" action="{% url 'backoffice:orcamentos_novo' %}">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Cliente</label>
            <select name="customer" class="form-select" required>
              <option value="">Selecione um cliente...</option>
              {% for customer in customers %}
                <option value="{{ customer.id }}">{{ customer.name }} ({{ customer.document }})</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Nome da Obra / Título</label>
            <input type="text" name="title" class="form-control" required placeholder="Ex: Reforma Cozinha Apartamento 201">
          </div>
          <div class="mb-3">
            <label class="form-label">Endereço da Obra</label>
            <input type="text" name="service_location" class="form-control" placeholder="Rua, Número, Bairro, Cidade">
          </div>
          <div class="mb-3">
            <label class="form-label">Resumo do Escopo (Opcional)</label>
            <textarea name="scope_summary" class="form-control" rows="3"></textarea>
          </div>
          <div class="text-end">
            <a href="{% url 'backoffice:orcamentos' %}" class="btn btn-secondary">Voltar</a>
            <button type="submit" class="btn btn-primary">Criar Orçamento e Inserir Itens <i class="bi bi-arrow-right"></i></button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
