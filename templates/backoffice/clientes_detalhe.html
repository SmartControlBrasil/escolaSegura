{% extends 'backoffice/base.html' %}
{% block content %}
<div class="row">
  <div class="col-12 col-lg-8 mx-auto">
    <div class="card">
      <div class="card-header py-3">
        <h6 class="mb-0">Detalhes do Cliente: {{ customer.name }}</h6>
      </div>
      <div class="card-body">
        <form method="post" action="{% url 'backoffice:clientes_detalhe' customer.id %}">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Tipo de Cliente</label>
            <select name="type" class="form-select">
              <option value="person" {% if customer.type == 'person' %}selected{% endif %}>Pessoa Física</option>
              <option value="company" {% if customer.type == 'company' %}selected{% endif %}>Pessoa Jurídica</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Nome / Razão Social *</label>
            <input type="text" name="name" class="form-control" value="{{ customer.name }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Documento (CPF/CNPJ)</label>
            <input type="text" name="document" class="form-control" value="{{ customer.document }}">
          </div>
          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" name="email" class="form-control" value="{{ customer.email }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Telefone</label>
            <input type="text" name="phone" class="form-control" value="{{ customer.phone }}">
          </div>
          <div class="text-end">
            <a href="{% url 'backoffice:clientes' %}" class="btn btn-secondary">Voltar</a>
            <button type="submit" class="btn btn-primary">Atualizar</button>
          </div>
        
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">WhatsApp</label>
            <input type="text" name="whatsapp" class="form-control" value="{{ customer.whatsapp }}">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Origem do Lead</label>
            <input type="text" name="lead_origin" class="form-control" value="{{ customer.lead_origin }}">
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label">Endereço Completo</label>
        <textarea name="address" class="form-control" rows="2">{{ customer.address }}</textarea>
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" name="lgpd_consent" class="form-check-input" id="lgpd" {% if customer.lgpd_consent %}checked{% endif %}>
        <label class="form-check-label" for="lgpd">Consentimento LGPD Ativo</label>
    </div>
    <div class="mb-3">
        <label class="form-label">Status</label>
        <select name="status" class="form-select">
            <option value="active" {% if customer.status == 'active' %}selected{% endif %}>Ativo</option>
            <option value="inactive" {% if customer.status == 'inactive' %}selected{% endif %}>Inativo</option>
            <option value="prospect" {% if customer.status == 'prospect' %}selected{% endif %}>Prospect</option>
        </select>
    </div>
    
</form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
